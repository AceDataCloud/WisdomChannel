name: Publish to PyPI

# Mirrors the AceDataCloud MCP-server publish pattern: merge to main → publish
# to PyPI using the org-level PYPI_TOKEN. Version is date-based with a per-day
# build number derived from PyPI, so repeated merges never collide.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate date-based version (YYYY.M.D.BUILD)
        id: version
        run: |
          DATE_PREFIX=$(date +'%Y.%-m.%-d')
          pip install requests -q
          LATEST_BUILD=$(python -c "
          import requests
          try:
              resp = requests.get('https://pypi.org/pypi/wisdom-channel/json', timeout=10)
              versions = resp.json().get('releases', {}).keys() if resp.status_code == 200 else []
              builds = [int(v.split('.')[3]) for v in versions
                        if v.startswith('${DATE_PREFIX}') and len(v.split('.')) == 4]
              print(max(builds) + 1 if builds else 0)
          except Exception:
              print(0)
          ")
          VERSION="${DATE_PREFIX}.${LATEST_BUILD}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using version: $VERSION"

      - name: Stamp version into pyproject.toml
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" pyproject.toml
          grep '^version =' pyproject.toml

      - name: Build distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          pip install "twine>=5.0,<6.1"
          twine check dist/*
          twine upload --skip-existing dist/*
