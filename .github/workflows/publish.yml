name: Publish to PyPI

# Publishes to PyPI whenever the package changes on main (merge a PR → publish),
# or manually via workflow_dispatch. Version is a unique CalVer timestamp so
# repeated merges never collide; skip-existing makes re-runs idempotent.
on:
  push:
    branches: [main]
    paths:
      - "wisdom_channel/**"
      - "pyproject.toml"
      - "README.md"
  workflow_dispatch:
    inputs:
      version:
        description: "Override version (defaults to CalVer YYYY.M.D.HHMM)"
        required: false
        default: ""

# Avoid overlapping publishes racing on the same version.
concurrency:
  group: publish-pypi
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for PyPI trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compute version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Unique per minute → no PyPI version collisions across merges.
            VERSION="$(date -u +%Y.%-m.%-d.%H%M)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using version: $VERSION"

      - name: Stamp version into pyproject.toml
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" pyproject.toml
          grep '^version =' pyproject.toml

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build distribution
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
